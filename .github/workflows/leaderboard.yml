name: Auto-Update Leaderboard (GitHub Pages)

on:
  schedule:
    # Runs every 15 minutes.
    - cron: "*/1 * * * *"
  workflow_dispatch: # Allows you to run it manually from the GitHub UI

permissions:
  contents: write # Required to push the json file back to the repo
  pages: write # Required to deploy to GitHub Pages
  id-token: write # Required for GitHub Pages

jobs:
  update-leaderboard:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Leaderboard-Backend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install Dependencies
        run: npm install

      - name: Generate JSON
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node Leaderboard.js

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add public/leaderboard.json
          # Only commit and push if there are changes
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update leaderboard.json" && git push)

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./Leaderboard-Backend/public"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
